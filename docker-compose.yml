services:

  frontend:
    container_name: frontend
    build:
      context: ../../ecomeal-frontend
      dockerfile: Dockerfile

    ports:
      - "80:80"

    depends_on:
      - paciente-service
      - planoalimentar-service
      - recomendacao-service

    networks:
      - ecomeal-network


  paciente-service:
    container_name: paciente-service

    build:
      context: ../../ecomeal-paciente-service
      dockerfile: Dockerfile

    ports:
      - "8002:8002"

    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ecomeal_paciente
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}

    depends_on:
      - postgres

    networks:
      - ecomeal-network


  planoalimentar-service:
    container_name: planoalimentar-service

    build:
      context: ../../ecomeal-planoalimentar-service
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ecomeal_planoalimentar
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      PACIENTE_SERVICE_URL:
        http://paciente-service:8002

    depends_on:
      - postgres
      - rabbitmq
      - paciente-service

    networks:
      - ecomeal-network


  recomendacao-service:
    container_name: recomendacao-service

    build:
      context: ../../ecomeal-recomendacao-service
      dockerfile: Dockerfile

    ports:
      - "8001:8001"

    environment:

      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ecomeal_recomendacao
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

      PLANOALIMENTAR_SERVICE_URL:
        http://planoalimentar-service:8000


    depends_on:
      - postgres
      - rabbitmq
      - planoalimentar-service

    networks:
      - ecomeal-network



  postgres:
    container_name: postgres

    image: postgres:16

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres

    volumes:

      - postgres_data:/var/lib/postgresql/data

      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql


    networks:
      - ecomeal-network



  rabbitmq:
    container_name: rabbitmq

    image: rabbitmq:3-management-alpine

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:

      RABBITMQ_DEFAULT_USER:
        ${RABBITMQ_USER}

      RABBITMQ_DEFAULT_PASS:
        ${RABBITMQ_PASSWORD}


    volumes:

      - rabbitmq_data:/var/lib/rabbitmq


    networks:
      - ecomeal-network



volumes:

  postgres_data:

  rabbitmq_data:



networks:

  ecomeal-network:
    driver: bridge